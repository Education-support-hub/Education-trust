<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  
  <!-- Base Background -->
  <rect width="1200" height="600" fill="url(#grad1)"/>
  
  <!-- Overlay -->
  <rect width="1200" height="600" fill="url(#grad2)"/>
  
  <!-- Floating Books - Left Side -->
  <g id="book1" transform="translate(150, 100)">
    <!-- Book Shadow -->
    <ellipse cx="0" cy="150" rx="50" ry="10" fill="rgba(0,0,0,0.1)"/>
    
    <!-- Book Main -->
    <rect x="-40" y="0" width="80" height="120" rx="5" fill="#FF6B6B"/>
    
    <!-- Book Spine -->
    <rect x="-42" y="0" width="4" height="120" rx="2" fill="#E63946"/>
    
    <!-- Book Text Lines -->
    <line x1="-30" y1="20" x2="30" y2="20" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="-30" y1="35" x2="30" y2="35" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <line x1="-30" y1="48" x2="30" y2="48" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <line x1="-30" y1="100" x2="30" y2="100" stroke="white" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Floating Books - Right Side -->
  <g id="book2" transform="translate(1050, 150)">
    <!-- Book Shadow -->
    <ellipse cx="0" cy="150" rx="50" ry="10" fill="rgba(0,0,0,0.1)"/>
    
    <!-- Book Main -->
    <rect x="-40" y="0" width="80" height="120" rx="5" fill="#4ECDC4"/>
    
    <!-- Book Spine -->
    <rect x="-42" y="0" width="4" height="120" rx="2" fill="#2C9B8E"/>
    
    <!-- Book Text Lines -->
    <line x1="-30" y1="20" x2="30" y2="20" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="-30" y1="35" x2="30" y2="35" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <line x1="-30" y1="48" x2="30" y2="48" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <line x1="-30" y1="100" x2="30" y2="100" stroke="white" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Graduation Cap -->
  <g id="cap" transform="translate(600, 80)">
    <!-- Cap Board -->
    <rect x="-70" y="0" width="140" height="15" rx="2" fill="#FFD93D"/>
    
    <!-- Cap Sides -->
    <polygon points="-60,15 -20,50 0,50 20,50 60,15" fill="#FDB833"/>
    
    <!-- Tassel -->
    <line x1="0" y1="15" x2="0" y2="80" stroke="#FFD93D" stroke-width="3"/>
    <circle cx="0" cy="85" r="8" fill="#FFD93D"/>
  </g>
  
  <!-- Floating Stars -->
  <circle cx="200" cy="50" r="4" fill="white" opacity="0.6"/>
  <circle cx="400" cy="80" r="3" fill="white" opacity="0.5"/>
  <circle cx="800" cy="40" r="4" fill="white" opacity="0.6"/>
  <circle cx="950" cy="100" r="3" fill="white" opacity="0.5"/>
  
  <!-- Decorative Circles -->
  <circle cx="100" cy="500" r="60" fill="white" opacity="0.05"/>
  <circle cx="1100" cy="500" r="80" fill="white" opacity="0.05"/>
  <circle cx="600" cy="550" r="100" fill="white" opacity="0.03"/>
</svg>