<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  
  <!-- Base Background -->
  <rect width="1200" height="600" fill="url(#grad5)"/>
  
  <!-- Overlay -->
  <rect width="1200" height="600" fill="url(#grad6)"/>
  
  <!-- Left Side - Light Bulb (Idea) -->
  <g id="lightbulb" transform="translate(150, 150)">
    <!-- Bulb -->
    <circle cx="40" cy="40" r="30" fill="#FFD93D" stroke="white" stroke-width="2"/>
    
    <!-- Bulb Highlight -->
    <circle cx="30" cy="30" r="12" fill="white" opacity="0.6"/>
    
    <!-- Base -->
    <rect x="32" y="70" width="16" height="8" rx="2" fill="#8B7355"/>
    <rect x="28" y="78" width="24" height="4" fill="#8B7355"/>
    
    <!-- Glow Effect -->
    <circle cx="40" cy="40" r="35" fill="none" stroke="#FFD93D" stroke-width="2" opacity="0.3"/>
    <circle cx="40" cy="40" r="42" fill="none" stroke="#FFD93D" stroke-width="1" opacity="0.2"/>
  </g>
  
  <!-- Center - Open Book with Pages -->
  <g id="openbook" transform="translate(550, 180)">
    <!-- Left Page -->
    <rect x="-60" y="0" width="55" height="80" rx="3" fill="#FFFFFF" opacity="0.95" stroke="white" stroke-width="2"/>
    
    <!-- Right Page -->
    <rect x="5" y="0" width="55" height="80" rx="3" fill="#F0F0F0" opacity="0.95" stroke="white" stroke-width="2"/>
    
    <!-- Spine -->
    <rect x="-5" y="0" width="10" height="80" fill="#E8E8E8"/>
    
    <!-- Text Lines on Left Page -->
    <line x1="-50" y1="15" x2="-10" y2="15" stroke="#667eea" stroke-width="1.5" opacity="0.6"/>
    <line x1="-50" y1="25" x2="-10" y2="25" stroke="#667eea" stroke-width="1" opacity="0.4"/>
    <line x1="-50" y1="33" x2="-10" y2="33" stroke="#667eea" stroke-width="1" opacity="0.4"/>
    <line x1="-50" y1="60" x2="-10" y2="60" stroke="#667eea" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Text Lines on Right Page -->
    <line x1="13" y1="15" x2="53" y2="15" stroke="#764ba2" stroke-width="1.5" opacity="0.6"/>
    <line x1="13" y1="25" x2="53" y2="25" stroke="#764ba2" stroke-width="1" opacity="0.4"/>
    <line x1="13" y1="33" x2="53" y2="33" stroke="#764ba2" stroke-width="1" opacity="0.4"/>
    <line x1="13" y1="60" x2="53" y2="60" stroke="#764ba2" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Right Side - Certificate/Achievement -->
  <g id="certificate" transform="translate(950, 150)">
    <!-- Certificate Paper -->
    <rect x="-45" y="0" width="90" height="110" rx="5" fill="#FFF8DC" stroke="white" stroke-width="2" opacity="0.95"/>
    
    <!-- Border Pattern -->
    <rect x="-42" y="3" width="84" height="104" rx="3" fill="none" stroke="#FFD700" stroke-width="3"/>
    
    <!-- Title -->
    <rect x="-35" y="10" width="70" height="8" fill="#FFD700" opacity="0.8"/>
    
    <!-- Text Lines -->
    <line x1="-30" y1="25" x2="30" y2="25" stroke="#333" stroke-width="1.5" opacity="0.6"/>
    <line x1="-30" y1="35" x2="30" y2="35" stroke="#333" stroke-width="1" opacity="0.4"/>
    <line x1="-30" y1="45" x2="30" y2="45" stroke="#333" stroke-width="1" opacity="0.4"/>
    
    <!-- Seal -->
    <circle cx="-15" cy="75" r="10" fill="#FF6B6B" opacity="0.8"/>
    <circle cx="-15" cy="75" r="7" fill="none" stroke="white" stroke-width="1"/>
    
    <!-- Star on Seal -->
    <polygon points="-15,-5 -12,0 -8,-3 -10,1 -5,2 -10,4 -8,9 -15,5 -22,9 -20,4 -25,2 -20,1 -18,-3 -18,0" 
             fill="white" transform="translate(-15 75) scale(0.5)" opacity="0.9"/>
  </g>
  
  <!-- Bottom - Network Connections -->
  <g id="network" stroke="white" stroke-width="2" opacity="0.4">
    <!-- Connection Lines -->
    <line x1="250" y1="450" x2="450" y2="500"/>
    <line x1="750" y1="480" x2="950" y2="450"/>
    <line x1="300" y1="500" x2="600" y2="520"/>
    
    <!-- Connection Points -->
    <circle cx="250" cy="450" r="4" fill="white" opacity="0.6"/>
    <circle cx="450" cy="500" r="4" fill="white" opacity="0.6"/>
    <circle cx="750" cy="480" r="4" fill="white" opacity="0.6"/>
    <circle cx="950" cy="450" r="4" fill="white" opacity="0.6"/>
  </g>
  
  <!-- Floating Bubbles -->
  <circle cx="150" cy="400" r="40" fill="white" opacity="0.08"/>
  <circle cx="1050" cy="500" r="60" fill="white" opacity="0.08"/>
  <circle cx="600" cy="550" r="80" fill="white" opacity="0.05"/>
</svg>